<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Page Title</title>
    <style>
        .video-logo {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: -48px;
            width: min(160px, 60vw);
            height: auto;
            display: block;
            pointer-events: none;
        }
        .video-container {
            overflow: visible;
        }
        @media (max-width: 600px) {
            .video-logo {
                bottom: -40px;
                /* Ensure this is replacing the previous top rule */
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <img class="video-logo" src="logo.png" alt="Video Logo">
    </div>
</body>
</html>
