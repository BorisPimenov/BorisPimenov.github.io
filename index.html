<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Website Title</title>
    <style>
        .video-container {
            /* Original styles remain unchanged */
            position: relative;
            width: 100%;
            height: auto;
        }

        .video-logo {
            width: 120px;
            position: absolute;
            top: calc(18px + (100% * (16/9)) + 12px);
        }

        @media (max-width: 768px) {
            .video-logo {
                /* Keep existing responsive rule's adjustments here */
            }
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls>
            <source src="video.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <img class="video-logo" src="logo.png" alt="Logo">
    </div>
</body>
</html>
