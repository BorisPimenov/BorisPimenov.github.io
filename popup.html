<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Istruzioni</title>

  <!-- Poppins font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root { color-scheme: dark; }

    * { box-sizing: border-box; }

    body{
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #000;
      color: #fff;
      font-family: "Poppins", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      padding: 24px;
    }

    .wrap{
      width: 100%;
      max-width: 900px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      padding: 28px;
      background: rgba(255,255,255,.04);
    }

    h1{
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: .2px;
    }

    p{
      margin: 0;
      font-size: 18px;
      line-height: 1.6;
      opacity: .95;
    }

    .actions{
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    a.btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 14px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,.18);
      color: #000;
      background: #fff;
    }

    a.btn.secondary{
      background: transparent;
      color: #fff;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>Istruzioni</h1>
    <p>
      Quando appare questo simbolo accompagnato da una domanda puoi intergaire con la perfomance e scrivere.
    </p>

    <div class="actions">
      <a class="btn" href="index.html">Torna alla Home</a>
      <a class="btn secondary" href="javascript:window.print()">Stampa / Salva PDF</a>
    </div>
  </main>
</body>
</html>
