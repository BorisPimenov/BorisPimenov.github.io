<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Example</title>
    <script>
        function openPopup() {
            document.getElementById('popupOverlay').style.display = 'block';
        }

        function closePopup() {
            document.getElementById('popupOverlay').style.display = 'none';
        }

        // Modified click handler for popupOkBtn
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('popupOkBtn').addEventListener('click', function() {
                closePopup(); // optional call
                window.location.href = 'index.html'; // navigation to index.html
            });
        });

        document.addEventListener('keypress', function(e) {
            if (e.key === "Escape") {
                closePopup(); // keep ESC closing behavior
            }
        });
    </script>
</head>
<body>
    <div id="popupOverlay" style="display:none;">
        <div class="popupContent">
            <h2>Popup Title</h2>
            <p>This is some content in the popup.</p>
            <button id="popupOkBtn">OK</button>
            <button onclick="closePopup()">Cancel</button>
        </div>
    </div>
</body>
</html>
